<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIZA Hub - Smart Ads</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .points-display { background: rgba(56, 189, 248, 0.1); padding: 20px; border-radius: 20px; border: 1px dashed var(--primary); margin-bottom: 20px; }
        #points-val { font-size: 50px; font-weight: bold; color: var(--primary); display: block; }
        .btn-main { background: #334155; padding: 20px; border-radius: 20px; cursor: pointer; border: none; color: white; width: 100%; font-size: 18px; margin-bottom: 10px; transition: 0.3s; }
        .btn-main:active { transform: scale(0.98); }
        .btn-withdraw { background: #22c55e; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="app-screen" class="container">
    <div class="points-display">
        <small>رصيدك الحالي</small>
        <span id="points-val">0.00</span>
    </div>

    <button class="btn-main" id="video-btn" style="background: linear-gradient(to left, #0284c7, #38bdf8);">
        📺 شاهد واربح (1.00+)
    </button>
    
    <button class="btn-main" id="spin-btn">🎡 عجلة الحظ</button>
    
    <button class="btn-main btn-withdraw" id="withdraw-btn">💰 طلب سحب (OKX)</button>
    
    <p style="font-size: 12px; color: #64748b; margin-top: 20px;">
        إذا لم يفتح الإعلان، يرجى مراسلة الدعم لتحديث الرابط.
    </p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA8n2m3L1QlKAJr-ZGLXUtbImOq29-lsOk",
        authDomain: "mstufa-1f409.firebaseapp.com",
        projectId: "mstufa-1f409",
        storageBucket: "mstufa-1f409.firebasestorage.app",
        messagingSenderId: "638217767100",
        appId: "1:638217767100:web:de2dbc5b5584e1c137a8b9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 🛑 غير هذا الرابط برابط جديد من Adsterra إذا استمرت المشكلة
    const ADS_URL = "https://s-vignette.com/smartlink/28912814"; 
    const SOFI_TG = "https://t.me/x00x0f";

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) document.getElementById('points-val').innerText = snap.data().points.toFixed(2);
        }
    });

    document.getElementById('video-btn').onclick = () => {
        // نفتح الإعلان أولاً
        window.open(ADS_URL, '_blank');

        // ثم نبدأ المؤقت بداخل التطبيق فوراً
        let timeLeft = 30;
        Swal.fire({
            title: 'جاري التحقق من المشاهدة',
            html: `انتظر <b id="timer" style="color:var(--primary); font-size:25px;">${timeLeft}</b> ثانية لاستلام الربح.`,
            footer: 'ملاحظة: إذا ظهرت صفحة خطأ، انتظر انتهاء الوقت للحصول على النقاط.',
            showConfirmButton: false,
            allowOutsideClick: false,
            didOpen: () => {
                const countdown = setInterval(async () => {
                    timeLeft--;
                    if(document.getElementById('timer')) document.getElementById('timer').innerText = timeLeft;
                    if(timeLeft <= 0) {
                        clearInterval(countdown);
                        await updateDoc(doc(db, "users", auth.currentUser.uid), { points: increment(1) });
                        Swal.fire('تم!', 'حصلت على 1.00 نقطة', 'success').then(()=>location.reload());
                    }
                }, 1000);
            }
        });
    };

    document.getElementById('withdraw-btn').onclick = () => {
        window.open(`${SOFI_TG}?text=اريد سحب ارباحي`);
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIZA Pro - Earn & Spin</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #38bdf8; --accent: #f59e0b; --bg: #0f172a; --card: #1e293b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; background: var(--card); padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .points-display { background: rgba(56, 189, 248, 0.1); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px dashed var(--primary); }
        #points-box { font-size: 48px; font-weight: 900; color: var(--primary); }
        
        .grid-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .action-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 18px; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .action-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.08); }
        .action-card i { font-size: 24px; display: block; margin-bottom: 8px; }

        .vip-section { margin-top: 30px; text-align: right; }
        .vip-card { background: linear-gradient(135deg, #334155, #1e293b); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-right: 5px solid var(--accent); }
        
        button { width: 100%; padding: 14px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-main { background: var(--primary); color: #000; margin-top: 10px; }
        .btn-google { background: white; color: black; font-size: 18px; margin-top: 50px; }
        
        #loader { position: fixed; inset: 0; background: #0f172a; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>

    <div id="auth-screen" style="display:none; text-align:center;">
        <h1 style="font-size: 60px; color: var(--primary); margin-bottom: 10px;">VIZA</h1>
        <p>مرحباً بك في عالم الأرباح</p>
        <button class="btn-google" id="login-btn">سجل دخول بحساب جوجل</button>
    </div>

    <div id="app-screen" class="container" style="display:none;">
        <div class="points-display">
            <span style="font-size: 14px; color: #94a3b8;">رصيدك الحالي</span>
            <div id="points-box">0.00</div>
            <div style="font-size: 12px; color: var(--accent);">جاهز للسحب عبر OKX</div>
        </div>

        <div class="grid-actions">
            <div class="action-card" id="earn-btn">
                <span>📺</span>
                <small>شاهد واربح</small>
            </div>
            <div class="action-card" id="spin-btn">
                <span>🎡</span>
                <small>عجلة الحظ</small>
            </div>
        </div>

        <div class="vip-section">
            <h4 style="margin-bottom: 15px;">💎 اشتراكات VIP (مضاعفة الأرباح)</h4>
            <div class="vip-card">
                <div><b>الباقة الفضية</b><br><small>أرباح x2</small></div>
                <button style="width:auto; padding: 5px 15px; background: silver; color: black;" onclick="buyVIP('Silver')">اشترك</button>
            </div>
            <div class="vip-card" style="border-right-color: gold;">
                <div><b>الباقة الذهبية</b><br><small>أرباح x5</small></div>
                <button style="width:auto; padding: 5px 15px; background: gold; color: black;" onclick="buyVIP('Gold')">اشترك</button>
            </div>
        </div>

        <button class="btn-main" id="draw-btn" style="margin-top:20px; background: #22c55e; color: white;">💰 طلب سحب (OKX)</button>
        <button id="logout-btn" style="background:transparent; color:#64748b; font-size:12px; margin-top:10px;">تسجيل خروج</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, onAuthStateChanged, signOut, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8n2m3L1QlKAJr-ZGLXUtbImOq29-lsOk",
            authDomain: "mstufa-1f409.firebaseapp.com",
            projectId: "mstufa-1f409",
            storageBucket: "mstufa-1f409.firebasestorage.app",
            messagingSenderId: "638217767100",
            appId: "1:638217767100:web:de2dbc5b5584e1c137a8b9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const ADS_URL = "https://s-vignette.com/smartlink/28912814";

        onAuthStateChanged(auth, async (user) => {
            document.getElementById('loader').style.display = 'none';
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                if (snap.exists()) {
                    document.getElementById('points-box').innerText = snap.data().points.toFixed(2);
                } else {
                    await setDoc(userRef, { points: 0, lastAd: 0, vip: 'Normal' });
                    location.reload();
                }
            } else {
                document.getElementById('auth-screen').style.display = 'block';
                document.getElementById('app-screen').style.display = 'none';
            }
        });

        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);

        document.getElementById('earn-btn').onclick = async () => {
            window.open(ADS_URL, '_blank');
            let timeLeft = 30;
            Swal.fire({
                title: 'انتظر 30 ثانية للأرباح',
                html: `<b id="t">${timeLeft}</b> ثانية...`,
                showConfirmButton: false,
                didOpen: () => {
                    const t = setInterval(async () => {
                        timeLeft--;
                        if(document.getElementById('t')) document.getElementById('t').innerText = timeLeft;
                        if(timeLeft <= 0) {
                            clearInterval(t);
                            await updateDoc(doc(db, "users", auth.currentUser.uid), { points: increment(1) });
                            Swal.fire('مبروك!', '+1 نقطة', 'success').then(()=>location.reload());
                        }
                    }, 1000);
                }
            });
        };

        document.getElementById('spin-btn').onclick = () => {
            Swal.fire({
                title: '🎡 عجلة الحظ',
                text: 'جرب حظك واربح من 1 إلى 10 نقاط!',
                showCancelButton: true,
                confirmButtonText: 'دوران (Spin)'
            }).then(async (result) => {
                if(result.isConfirmed) {
                    const win = Math.floor(Math.random() * 10) + 1;
                    await updateDoc(doc(db, "users", auth.currentUser.uid), { points: increment(win) });
                    Swal.fire('كفو!', `ربحت ${win} نقطة!`, 'success').then(()=>location.reload());
                }
            });
        };

        window.buyVIP = (type) => {
            Swal.fire('طلب اشتراك', `أرسل طلب لتفعيل باقة ${type} للمدير عبر تليجرام`, 'info').then(() => {
                window.open(`https://t.me/sofi_hub?text=اريد تفعيل باقة ${type} لحسابي: ${auth.currentUser.uid}`);
            });
        };

        document.getElementById('draw-btn').onclick = () => {
            Swal.fire({
                title: 'سحب OKX',
                input: 'text',
                inputPlaceholder: 'الصق عنوان محفظة USDT هنا'
            }).then((res) => {
                if(res.value) window.open(`https://t.me/sofi_hub?text=طلب سحب للعنوان: ${res.value}`);
            });
        };

        document.getElementById('logout-btn').onclick = () => signOut(auth);
    </script>
</body>
</html>

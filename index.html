    <div class="subscription-header">شحن رصيد المحفظة</div>
    <div style="display: flex; gap: 10px; width: 95%; margin-top: 15px;">
        <div class="stat-box" onclick="deposit('MasterCard')" style="cursor:pointer; flex:1; border:1px solid #eb001b;">
            <i class="fab fa-cc-mastercard" style="color: #eb001b; font-size: 24px;"></i>
            <span class="stat-label" style="margin-top:10px; display:block;">MasterCard</span>
        </div>
        <div class="stat-box" onclick="deposit('OKX')" style="cursor:pointer; flex:1; border:1px solid #ffffff;">
            <i class="fas fa-wallet" style="color: #fff; font-size: 24px;"></i>
            <span class="stat-label" style="margin-top:10px; display:block;">OKX Wallet</span>
        </div>
    </div>

<script type="module">
    // ... (أكواد Firebase والاشتراكات السابقة) ...

    window.deposit = (method) => {
        Swal.fire({
            title: `شحن عبر ${method}`,
            html: `أدخل المبلغ الذي تريد شحنه ($):<br><br>
                   <input type="number" id="deposit-amount" class="swal2-input" placeholder="0.00" style="color:#000">`,
            showCancelButton: true,
            confirmButtonText: 'طلب شحن',
            cancelButtonText: 'إلغاء',
            background: '#121212',
            color: '#fff',
            preConfirm: () => {
                const amount = document.getElementById('deposit-amount').value;
                if (!amount || amount <= 0) {
                    Swal.showValidationMessage('يرجى إدخال مبلغ صالح');
                }
                return amount;
            }
        }).then((result) => {
            if (result.isConfirmed) {
                Swal.fire({
                    title: 'تم إرسال الطلب',
                    text: `يرجى التواصل مع الإدارة لإتمام عملية الدفع عبر ${method}. المبلغ: ${result.value}$`,
                    icon: 'success',
                    background: '#121212',
                    color: '#fff'
                });
                // هنا يمكنك ربط الطلب بـ Firebase ليصلك إشعار في لوحة التحكم
            }
        });
    };
</script>

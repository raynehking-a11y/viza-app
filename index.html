<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIZA Hub Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00ff88; --secondary: #ff9f0a; --bg: #050a0e; --card: #101820; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* كرت الرصيد العلوي */
        .balance-card { background: var(--card); width: 90%; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 15px; border-bottom: 3px solid var(--primary); }
        .balance-amount { font-size: 32px; font-weight: bold; color: var(--primary); display: block; }
        
        /* شبكة المعلومات */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 95%; margin-bottom: 30px; }
        .stat-box { background: var(--card); padding: 15px; border-radius: 15px; text-align: center; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .stat-box i { position: absolute; left: 10px; top: 10px; color: var(--secondary); font-size: 14px; }
        .stat-val { display: block; font-size: 22px; font-weight: bold; margin-top: 5px; }
        .stat-label { font-size: 11px; color: #888; }

        /* العداد الدائري الكبير */
        .main-circle-area { position: relative; width: 220px; height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 20px 0; }
        .outer-ring { position: absolute; width: 100%; height: 100%; border: 2px solid rgba(0,255,136,0.1); border-radius: 50%; }
        .play-btn { background: linear-gradient(135deg, #00ff88, #008855); width: 140px; height: 140px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 0 30px rgba(0,255,136,0.3); transition: 0.3s; z-index: 2; }
        .play-btn:active { transform: scale(0.9); }
        .circle-text { margin-top: 15px; text-align: center; z-index: 2; }
        .circle-text h2 { margin: 0; color: var(--primary); font-size: 28px; }
        
        /* زر الترقية البرتقالي */
        .upgrade-btn { background: linear-gradient(90deg, #ff9f0a, #ff6b00); width: 95%; padding: 18px; border-radius: 40px; border: none; color: white; font-weight: bold; font-size: 16px; margin: 20px 0; display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; }

        /* شريط التنقل السفلي */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { color: #555; text-align: center; font-size: 10px; text-decoration: none; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .center-nav { background: var(--primary); color: white !important; width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-top: -30px; box-shadow: 0 5px 15px rgba(0,255,136,0.4); }
    </style>
</head>
<body>

    <div class="balance-card">
        <small>إجمالي الرصيد</small>
        <span class="balance-amount"><span id="points-val">0.00</span> دولار</span>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <i class="fas fa-tachometer-alt"></i>
            <span class="stat-label">عداد النقاط</span>
            <span class="stat-val" style="color: var(--secondary);">25</span>
        </div>
        <div class="stat-box">
            <i class="fas fa-database"></i>
            <span class="stat-label">مجموع النقاط</span>
            <span class="stat-val">4774642</span>
        </div>
    </div>

    <div class="main-circle-area">
        <div class="outer-ring"></div>
        <div class="play-btn" id="task-btn">
            <i class="fas fa-play"></i>
        </div>
        <div class="circle-text">
            <h2>ابدأ الآن</h2>
            <small style="color: #666;">اضغط لتشغيل العداد</small>
        </div>
    </div>

    <button class="upgrade-btn" onclick="Swal.fire('قريباً', 'ميزة ترقية العداد ستتوفر في التحديث القادم', 'info')">
        <i class="fas fa-chevron-left"></i>
        <span>ترقية العداد <br> <small>ضاعف أرباحك اليومية ⚡</small></span>
    </button>

    <div class="nav-bar">
        <a href="#" class="nav-item"><i class="fas fa-user"></i>حسابي</a>
        <a href="#" class="nav-item"><i class="fas fa-ticket-alt"></i>اليانصيب</a>
        <a href="#" class="nav-item center-nav"><i class="fas fa-th-large"></i></a>
        <a href="#" class="nav-item"><i class="fas fa-store"></i>المتجر</a>
        <a href="#" class="nav-item active"><i class="fas fa-clock"></i>العدادات</a>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA8n2m3L1QlKAJr-ZGLXUtbImOq29-lsOk",
        authDomain: "mstufa-1f409.firebaseapp.com",
        projectId: "mstufa-1f409",
        storageBucket: "mstufa-1f409.firebasestorage.app",
        messagingSenderId: "638217767100",
        appId: "1:638217767100:web:de2dbc5b5584e1c137a8b9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // حط هنا رابط الـ Direct Link الخاص بك من Adsterra (نوع CPM)
    const AD_URL = "https://shrinkme.click/jkhs"; 

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) {
                document.getElementById('points-val').innerText = snap.data().points.toFixed(2);
            }
        }
    });

    document.getElementById('task-btn').onclick = async () => {
        const userRef = doc(db, "users", auth.currentUser.uid);
        const snap = await getDoc(userRef);
        
        if (snap.exists() && snap.data().lastTask && (Date.now() - snap.data().lastTask < 24 * 60 * 60 * 1000)) {
            Swal.fire('عذراً!', 'العداد يعمل مرة واحدة يومياً. ارجع باجر!', 'warning');
            return;
        }

        window.open(AD_URL, '_blank');
        
        let timer = 30;
        Swal.fire({
            title: 'جاري تشغيل العداد...',
            html: `<div style="font-size:30px; color:#00ff88; font-weight:bold;" id="timer">${timer}</div>`,
            showConfirmButton: false,
            allowOutsideClick: false,
            background: '#101820',
            color: '#fff',
            didOpen: () => {
                const interval = setInterval(async () => {
                    timer--;
                    if(document.getElementById('timer')) document.getElementById('timer').innerText = timer;
                    if (timer <= 0) {
                        clearInterval(interval);
                        await updateDoc(userRef, { points: increment(1.00), lastTask: Date.now() });
                        Swal.fire('نجاح', 'تم الشحن بنجاح ✅', 'success').then(()=>location.reload());
                    }
                }, 1000);
            }
        });
    };
</script>
</body>
</html>

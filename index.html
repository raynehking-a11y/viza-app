<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIZA Pro - Earn & Spin</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #38bdf8; --accent: #fbbf24; --bg: #0f172a; --card: #1e293b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .points-box { background: linear-gradient(145deg, #1e293b, #0f172a); padding: 25px; border-radius: 25px; margin-bottom: 25px; border: 2px solid var(--primary); box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
        #points-val { font-size: 54px; font-weight: 900; color: var(--primary); display: block; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .btn-action { background: #334155; padding: 20px 10px; border-radius: 20px; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); }
        .btn-action:active { transform: scale(0.95); }
        .btn-action i { font-size: 30px; display: block; margin-bottom: 10px; }

        .vip-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid var(--accent); }
        .btn-withdraw { background: #22c55e; color: white; padding: 15px; border-radius: 20px; width: 100%; font-weight: bold; font-size: 18px; border: none; margin-top: 20px; cursor: pointer; box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3); }
        
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<div id="auth-screen" style="display:none; text-align:center; margin-top: 100px;">
    <h1 style="font-size: 70px; color: var(--primary); margin-bottom: 0;">VIZA</h1>
    <p style="color: #94a3b8;">اربح واسحب عبر OKX</p>
    <button id="login-btn" style="background:white; color:black; padding:15px 30px; border-radius:50px; border:none; font-weight:bold; margin-top:40px; cursor:pointer; font-size:18px;">سجل دخول عبر Google</button>
</div>

<div id="app-screen" class="container" style="display:none;">
    <div class="points-box">
        <small style="color: #94a3b8;">رصيدك الحالي</small>
        <span id="points-val">0.00</span>
        <small style="color: var(--accent);">قابل للسحب فوراً</small>
    </div>

    <div class="action-grid">
        <div class="btn-action" id="video-btn">
            <span>📺</span>
            <div style="font-size:14px; margin-top:5px;">شاهد واربح</div>
        </div>
        <div class="btn-action" id="spin-btn">
            <span>🎡</span>
            <div style="font-size:14px; margin-top:5px;">عجلة الحظ</div>
        </div>
    </div>

    <h4 style="text-align:right; margin-bottom:10px;">💎 باقات الـ VIP</h4>
    <div class="vip-card">
        <div style="text-align:right;"><b>الباقة الفضية</b><br><small>أرباح x2</small></div>
        <button onclick="contactSofi('Silver')" style="background:silver; color:black; border:none; padding:8px 15px; border-radius:10px; cursor:pointer;">تفعيل</button>
    </div>
    <div class="vip-card" style="border-right-color: gold;">
        <div style="text-align:right;"><b>الباقة الذهبية</b><br><small>أرباح x5</small></div>
        <button onclick="contactSofi('Gold')" style="background:gold; color:black; border:none; padding:8px 15px; border-radius:10px; cursor:pointer;">تفعيل</button>
    </div>

    <button class="btn-withdraw" id="withdraw-btn">💰 طلب سحب (OKX)</button>
    <button id="logout-btn" style="background:none; border:none; color:#64748b; margin-top:20px; cursor:pointer;">تسجيل الخروج</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, onAuthStateChanged, signOut, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA8n2m3L1QlKAJr-ZGLXUtbImOq29-lsOk",
        authDomain: "mstufa-1f409.firebaseapp.com",
        projectId: "mstufa-1f409",
        storageBucket: "mstufa-1f409.firebasestorage.app",
        messagingSenderId: "638217767100",
        appId: "1:638217767100:web:de2dbc5b5584e1c137a8b9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    const ADS_URL = "https://s-vignette.com/smartlink/28912814";
    const SOFI_TG = "https://t.me/x00x0f";

    onAuthStateChanged(auth, async (user) => {
        document.getElementById('loader').style.display = 'none';
        if (user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);
            if (snap.exists()) {
                document.getElementById('points-val').innerText = snap.data().points.toFixed(2);
            } else {
                await setDoc(userRef, { points: 0, vip: 'Normal' });
                location.reload();
            }
        } else {
            document.getElementById('auth-screen').style.display = 'block';
            document.getElementById('app-screen').style.display = 'none';
        }
    });

    document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);

    document.getElementById('video-btn').onclick = () => {
        window.open(ADS_URL, '_blank');
        let timeLeft = 30;
        Swal.fire({
            title: 'انتظر 30 ثانية',
            html: `<b id="timer" style="font-size:30px; color:#38bdf8;">${timeLeft}</b> ثانية للأرباح...`,
            showConfirmButton: false,
            allowOutsideClick: false,
            didOpen: () => {
                const t = setInterval(async () => {
                    timeLeft--;
                    if(document.getElementById('timer')) document.getElementById('timer').innerText = timeLeft;
                    if(timeLeft <= 0) {
                        clearInterval(t);
                        await updateDoc(doc(db, "users", auth.currentUser.uid), { points: increment(1) });
                        Swal.fire('أحسنت!', 'تمت إضافة 1 نقطة لرصيدك', 'success').then(()=>location.reload());
                    }
                }, 1000);
            }
        });
    };

    document.getElementById('spin-btn').onclick = () => {
        Swal.fire({
            title: '🎡 دوران الحظ',
            text: 'هل تريد تجربة حظك الآن؟',
            showCancelButton: true,
            confirmButtonText: 'دوران!'
        }).then(async (result) => {
            if(result.isConfirmed) {
                const win = (Math.random() * 5).toFixed(2);
                await updateDoc(doc(db, "users", auth.currentUser.uid), { points: increment(parseFloat(win)) });
                Swal.fire('مبروك!', `ربحت ${win} نقطة!`, 'success').then(()=>location.reload());
            }
        });
    };

    window.contactSofi = (plan) => {
        window.open(`${SOFI_TG}?text=اريد تفعيل باقة ${plan} لحسابي: ${auth.currentUser.uid}`);
    };

    document.getElementById('withdraw-btn').onclick = () => {
        Swal.fire({
            title: 'سحب OKX',
            input: 'text',
            inputPlaceholder: 'أدخل عنوان USDT (TRC20)',
            confirmButtonText: 'إرسال الطلب'
        }).then((res) => {
            if(res.value) window.open(`${SOFI_TG}?text=طلب سحب للعنوان: ${res.value}`);
        });
    };

    document.getElementById('logout-btn').onclick = () => signOut(auth);
</script>
</body>
</html>

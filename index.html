<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIZA Hub - Earn & Spin</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --success: #22c55e; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .points-display { background: rgba(56, 189, 248, 0.1); padding: 20px; border-radius: 20px; border: 1px dashed var(--primary); margin-bottom: 20px; }
        #points-val { font-size: 50px; font-weight: bold; color: var(--primary); display: block; }
        .btn-main { background: #334155; padding: 18px; border-radius: 18px; cursor: pointer; border: none; color: white; width: 100%; font-size: 17px; margin-bottom: 12px; transition: 0.3s; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-main:active { transform: scale(0.96); }
        .btn-ads { background: linear-gradient(135deg, #0284c7, #38bdf8); }
        .btn-withdraw { background: #f59e0b; margin-top: 10px; }
        .footer-text { font-size: 12px; color: #64748b; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="points-display">
        <small>رصيدك الحالي</small>
        <span id="points-val">0.00</span>
        <small style="color: var(--primary);">جاهز للسحب عبر OKX</small>
    </div>

    <button class="btn-main btn-ads" id="task-btn">
        🎯 نفذ مهمة الربح (1.00+)
    </button>
    
    <button class="btn-main" id="spin-btn">🎡 عجلة الحظ اليومية</button>
    
    <button class="btn-main btn-withdraw" id="withdraw-btn">💰 طلب سحب الأرباح</button>
    
    <p class="footer-text">بإدارة المبرمج صوفي - VIZA Pro</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA8n2m3L1QlKAJr-ZGLXUtbImOq29-lsOk",
        authDomain: "mstufa-1f409.firebaseapp.com",
        projectId: "mstufa-1f409",
        storageBucket: "mstufa-1f409.firebasestorage.app",
        messagingSenderId: "638217767100",
        appId: "1:638217767100:web:de2dbc5b5584e1c137a8b9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // الرابط الجديد اللي عطيته إلي
    const ADS_URL = "https://www.profitablecpmratenetwork.com/z27v2ey2q?key=19c606938d6f933a67243d9ebfa39d70";
    const SOFI_TG = "https://t.me/x00x0f";

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) {
                document.getElementById('points-val').innerText = snap.data().points.toFixed(2);
            }
        }
    });

    // تفعيل زر المهمة
    document.getElementById('task-btn').onclick = () => {
        window.open(ADS_URL, '_blank');
        
        let timeLeft = 30;
        Swal.fire({
            title: 'جاري فحص المهمة...',
            html: `يرجى الانتظار <b id="timer" style="color:var(--primary); font-size:25px;">${timeLeft}</b> ثانية لضمان إضافة النقاط.`,
            icon: 'info',
            showConfirmButton: false,
            allowOutsideClick: false,
            didOpen: () => {
                const countdown = setInterval(async () => {
                    timeLeft--;
                    if(document.getElementById('timer')) document.getElementById('timer').innerText = timeLeft;
                    if(timeLeft <= 0) {
                        clearInterval(countdown);
                        await updateDoc(doc(db, "users", auth.currentUser.uid), { points: increment(1.00) });
                        Swal.fire('أحسنت!', 'تمت إضافة 1.00 نقطة لرصيدك', 'success').then(()=>location.reload());
                    }
                }, 1000);
            }
        });
    };

    // تفعيل عجلة الحظ بتصميم احترافي
    document.getElementById('spin-btn').onclick = () => {
        Swal.fire({
            title: '🎡 دوران الحظ...',
            text: 'جاري سحب جائزتك العشوائية',
            timer: 2000,
            showConfirmButton: false,
            didOpen: () => { Swal.showLoading(); }
        }).then(async () => {
            const prizes = [0.1, 0.5, 1.0, 2.0]; // جوائز متنوعة
            const win = prizes[Math.floor(Math.random() * prizes.length)];
            await updateDoc(doc(db, "users", auth.currentUser.uid), { points: increment(win) });
            Swal.fire('مبروك!', `لقد ربحت ${win} نقطة إضافية!`, 'success').then(()=>location.reload());
        });
    };

    // طلب السحب
    document.getElementById('withdraw-btn').onclick = () => {
        window.open(`${SOFI_TG}?text=أهلاً صوفي، أريد سحب أرباحي من تطبيق VIZA`);
    };
</script>
</body>
</html>
